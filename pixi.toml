[workspace]
name = "my-openbrain"
version = "0.1.0"
description = "Personal open-brain knowledge infrastructure via MCP + PostgreSQL RAG"
authors = ["craig8"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.13"

[pypi-dependencies]
# Core
mcp = ">=1.0.0"
asyncpg = ">=0.29.0"
fastembed = ">=0.4.0"
pydantic = ">=2.0.0"
pydantic-settings = ">=2.0.0"
python-dotenv = ">=1.0.0"
structlog = ">=24.0.0"
# Web UI
fastapi = ">=0.115.0"
uvicorn = {version = ">=0.30.0", extras = ["standard"]}
websockets = ">=12.0"
# Telegram bot
python-telegram-bot = ">=21.0"
# Slack bot (socket mode — no public URL required)
slack-bolt = ">=1.18.0"
aiohttp = ">=3.9.0"

[feature.dev.pypi-dependencies]
pytest = ">=8.0.0"
pytest-asyncio = ">=0.23.0"
pytest-cov = ">=5.0.0"

[environments]
default = { features = [], solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }

[tasks]
server   = "python -m openbrain.server"
web      = "python -m openbrain.web.app"
telegram = "python -m openbrain.telegram_bot"
slack    = "python -m openbrain.slack_bot"
setup-db = "bash scripts/setup-db.sh"
install-services = "sudo bash scripts/install-services.sh"

[feature.dev.tasks]
test = "pytest tests/ -v --cov=src/openbrain --cov-report=term-missing"
