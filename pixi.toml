[project]
name = "my-openbrain"
version = "0.1.0"
description = "Personal open-brain knowledge infrastructure via MCP + PostgreSQL RAG"
authors = ["craig8"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.13"

[pypi-dependencies]
mcp = ">=1.0.0"
asyncpg = ">=0.29.0"
fastembed = ">=0.4.0"
pydantic = ">=2.0.0"
pydantic-settings = ">=2.0.0"
python-dotenv = ">=1.0.0"
structlog = ">=24.0.0"

[pypi-dependencies.dev]
pytest = ">=8.0.0"
pytest-asyncio = ">=0.23.0"
pytest-cov = ">=5.0.0"

[tasks]
server = "python -m openbrain.server"
setup-db = "bash scripts/setup-db.sh"
test = "pytest tests/ -v --cov=src/openbrain --cov-report=term-missing"

[tool.pixi.feature.dev.tasks]
test-watch = "pytest tests/ -v --watch"
