<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenBrain</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
      --accent: #6c8ef5; --accent-dim: #3d4f8a; --text: #e2e4f0; --text-dim: #7b82a8;
      --green: #4ade80; --amber: #fbbf24; --red: #f87171;
      --radius: 10px; --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100dvh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; gap: 10px; padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    header h1 { font-size: 1rem; font-weight: 600; }
    header .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-dim); }
    header .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); transition: background 0.3s; }
    header .dot.connected { background: var(--green); }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg { display: flex; flex-direction: column; max-width: 78%; gap: 4px; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.brain { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 10px 14px; border-radius: var(--radius); line-height: 1.55; font-size: 0.9rem; white-space: pre-wrap; word-break: break-word; }
    .msg.user .bubble { background: var(--accent-dim); border-bottom-right-radius: 3px; }
    .msg.brain .bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .bubble .md-bold { font-weight: 600; color: #fff; }
    .bubble .md-em   { color: var(--text-dim); }
    .bubble .md-code { font-family: var(--mono); background: var(--bg); padding: 1px 4px; border-radius: 3px; font-size: 0.82em; }
    .meta { font-size: 0.68rem; color: var(--text-dim); display: flex; gap: 8px; }
    .badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: var(--mono); font-size: 0.65rem; color: var(--accent); }
    .badge.decision { color: var(--amber); }
    .badge.insight  { color: var(--green); }
    .badge.person   { color: #c084fc; }
    .badge.meeting  { color: #22d3ee; }
    .badge.error    { color: var(--red); }
    .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .dot-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: pulse 1.2s ease-in-out infinite; }
    .dot-pulse:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
    #input-bar { padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
    #input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-family: var(--font); font-size: 0.9rem; outline: none; resize: none; line-height: 1.5; max-height: 120px; transition: border-color 0.2s; }
    #input:focus { border-color: var(--accent-dim); }
    #input::placeholder { color: var(--text-dim); }
    #send { background: var(--accent); border: none; border-radius: var(--radius); padding: 10px 18px; color: #fff; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: opacity 0.15s; align-self: flex-end; }
    #send:hover:not(:disabled) { opacity: 0.85; }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    #empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-dim); text-align: center; pointer-events: none; }
    #empty .icon { font-size: 2.5rem; opacity: 0.5; }
    #empty p { font-size: 0.85rem; max-width: 280px; line-height: 1.6; }
  </style>
</head>
<body>
<header>
  <span aria-hidden="true">🧠</span>
  <h1>OpenBrain</h1>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</header>
<div id="messages" role="log" aria-live="polite">
  <div id="empty">
    <div class="icon" aria-hidden="true">🧠</div>
    <p>Type a thought to capture it, or ask a question to search your brain.</p>
    <p>Type <strong>help</strong> to see all commands.</p>
  </div>
</div>
<div id="input-bar">
  <textarea id="input" rows="1" placeholder="Capture a thought, or search your brain…" aria-label="Message input" autofocus></textarea>
  <button id="send" disabled aria-label="Send message">Send</button>
</div>
<script>
'use strict';
const messagesEl = document.getElementById('messages');
const emptyEl    = document.getElementById('empty');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send');
const dotEl      = document.getElementById('dot');
const statusEl   = document.getElementById('status-text');

function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }

// Safe markdown rendering — splits text on tokens, builds DOM nodes, no innerHTML for content
function renderMarkdownSafe(text, container) {
  // Split on **bold**, *em*, `code` tokens
  const parts = text.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/);
  parts.forEach(function(part) {
    if (part.startsWith('**') && part.endsWith('**')) {
      const s = el('span', 'md-bold');
      s.textContent = part.slice(2, -2);
      container.appendChild(s);
    } else if (part.startsWith('*') && part.endsWith('*') && part.length > 2) {
      const s = el('span', 'md-em');
      s.textContent = part.slice(1, -1);
      container.appendChild(s);
    } else if (part.startsWith('`') && part.endsWith('`') && part.length > 2) {
      const s = el('span', 'md-code');
      s.textContent = part.slice(1, -1);
      container.appendChild(s);
    } else {
      container.appendChild(document.createTextNode(part));
    }
  });
}

function makeMsg(side) {
  const wrap = el('div', 'msg ' + side);
  const bubble = el('div', 'bubble');
  const meta   = el('div', 'meta');
  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  return { wrap, bubble, meta };
}

function timeStr() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function hideEmpty() { if (emptyEl) emptyEl.style.display = 'none'; }
function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function appendUser(text) {
  hideEmpty();
  const { wrap, bubble, meta } = makeMsg('user');
  bubble.textContent = text;
  meta.textContent = timeStr();
  messagesEl.appendChild(wrap);
  scrollBottom();
}

function appendBrain(text, intent, thoughtType) {
  hideEmpty();
  const { wrap, bubble, meta } = makeMsg('brain');
  renderMarkdownSafe(text, bubble);
  const badgeClass = intent === 'capture' ? (thoughtType || 'note') : (intent || '');
  const badgeLabel = intent === 'capture' ? (thoughtType || 'note') : intent;
  const timeNode = document.createTextNode(timeStr() + ' ');
  const badge = el('span', 'badge ' + badgeClass);
  badge.textContent = badgeLabel;
  meta.appendChild(timeNode);
  meta.appendChild(badge);
  messagesEl.appendChild(wrap);
  scrollBottom();
}

let typingEl = null;
function showTyping() {
  if (typingEl) return;
  typingEl = el('div', 'msg brain typing');
  const bubble = el('div', 'bubble');
  [0,1,2].forEach(function() { bubble.appendChild(el('div', 'dot-pulse')); });
  typingEl.appendChild(bubble);
  messagesEl.appendChild(typingEl);
  scrollBottom();
}
function removeTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

// WebSocket with auto-reconnect
let ws;
let reconnectDelay = 1000;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = function() {
    dotEl.classList.add('connected');
    statusEl.textContent = 'Connected';
    sendBtn.disabled = false;
    reconnectDelay = 1000;
  };
  ws.onclose = function() {
    dotEl.classList.remove('connected');
    statusEl.textContent = 'Reconnecting…';
    sendBtn.disabled = true;
    removeTyping();
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
  };
  ws.onerror = function() { ws.close(); };
  ws.onmessage = function(e) {
    removeTyping();
    let data;
    try { data = JSON.parse(e.data); } catch(err) { return; }
    appendBrain(data.content || '', data.intent || '', data.thought_type || '');
  };
}

connect();

function send() {
  const text = inputEl.value.trim();
  if (!text || ws.readyState !== WebSocket.OPEN) return;
  appendUser(text);
  ws.send(JSON.stringify({ message: text }));
  showTyping();
  inputEl.value = '';
  inputEl.style.height = 'auto';
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener('input', function() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
